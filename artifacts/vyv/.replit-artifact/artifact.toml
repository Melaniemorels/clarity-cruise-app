kind = "web"
previewPath = "/"
title = "VYV"
version = "1.0.0"
id = "artifacts/vyv"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23346

[services.development]
run = "pnpm --filter @workspace/vyv run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vyv", "run", "build" ]
publicDir = "artifacts/vyv/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23346"
BASE_PATH = "/"
