<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VYV — Visualize Your Vibe</title>
    <meta name="description" content="A wellness app that gives you back your time. Plan your perfect day, discover content, and connect with friends — all in one place." />
    <meta name="author" content="VYV" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="VYV — Visualize Your Vibe" />
    <meta property="og:description" content="A wellness app that gives you back your time. Plan your perfect day, discover content, and connect with friends." />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    <meta property="og:url" content="https://vyvapp.com/welcome" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VYV — Visualize Your Vibe" />
    <meta name="twitter:description" content="A wellness app that gives you back your time." />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="canonical" href="https://vyvapp.com/welcome" />

    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#0d1117;color:#e8ebed;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
      .container{max-width:480px;width:100%;text-align:center}
      .logo{font-size:3.5rem;font-weight:800;color:#4A8B7C;letter-spacing:-1px;margin-bottom:8px}
      .tagline{font-size:1.4rem;font-weight:600;color:#4A8B7C;margin-bottom:16px}
      .desc{color:#9aa4ae;font-size:1rem;line-height:1.6;margin-bottom:40px}
      .features{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:40px}
      .feature{display:flex;flex-direction:column;align-items:center;gap:8px}
      .feature-icon{font-size:2rem}
      .feature-label{font-size:0.75rem;color:#9aa4ae}
      .cta{display:inline-block;width:100%;padding:14px 24px;background:linear-gradient(135deg,#4A8B7C,#3d7a6b);color:#fff;font-size:1rem;font-weight:600;text-decoration:none;border-radius:12px;margin-bottom:12px}
      .cta:hover{opacity:.9}
      .hint{font-size:0.75rem;color:#9aa4ae}
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">VYV</div>
      <div class="tagline">Visualize Your Vibe</div>
      <p class="desc">A wellness app that gives you back your time. Mix and relax your life with one simple fact: you're enjoying the best of yourself.</p>
      <div class="features">
        <div class="feature">
          <div class="feature-icon">📸</div>
          <div class="feature-label">Quick Capture</div>
        </div>
        <div class="feature">
          <div class="feature-icon">⏰</div>
          <div class="feature-label">Focus Mode</div>
        </div>
        <div class="feature">
          <div class="feature-icon">🌿</div>
          <div class="feature-label">Wellness</div>
        </div>
      </div>
      <a class="cta" href="/sign-up">Get Started</a>
      <p class="hint">Already have an account? <a href="/sign-in" style="color:#4A8B7C">Sign in</a></p>
    </div>
  </body>
</html>
